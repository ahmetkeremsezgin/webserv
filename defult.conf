server {
    listen 9090;
    server_name localhost;
    client_max_body_size 1000;

    error_page 404 /tmp/www/error-pages/404.html;
    error_page 400 /tmp/www/error-pages/400.html;

    location /ana-sayfa {
        allow_methods GET POST;
        autoindex on;
        index index.html;
        client_max_body_size 100;
        root /tmp/www/ana-sayfa;
        cgi_ext .py /usr/bin/python3;
        cgi_ext .php /usr/bin/php-cgi;
        cgi_ext .js /usr/bin/node;
    }

    location /galeri {
        allow_methods GET POST DELETE;
        autoindex off;
        index galeri.html;
        client_max_body_size 10000;
        root /tmp/www/galeri;
        upload on;
        upload_path /tmp/www/uploads;
    }

    location /uploads {
        allow_methods GET DELETE;
        autoindex on;
        root /tmp/www/uploads;
    }
}